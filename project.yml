name: WireHack

options:
  bundleIdPrefix: io.github.sevmorris
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WireHack:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: WireHack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sevmorris.WireHack
        INFOPLIST_KEY_CFBundleDisplayName: WireHack
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
    info:
      path: WireHack/Info.plist
      properties:
        CFBundleName: WireHack
        CFBundleDisplayName: WireHack
        CFBundleShortVersionString: "1.9.1"
        CFBundleVersion: "10901"
        LSApplicationCategoryType: public.app-category.utilities
